- name: Client To Server
  slug: client-to-server
  type: lifecycle
  domain: lifecycle
  path: packages/react-table/skills/react/client-to-server/SKILL.md
  package: packages/react-table
  description: 'Convert a client-side table to server-side (a.k.a. manual modes). Pattern: pass server data, set `manualSorting`
    / `manualFiltering` / `manualPagination` / `manualGrouping` / `manualExpanding` for whatever the server now owns, supply
    `rowCount` (and/or `pageCount`) so the table can paginate without seeing all rows, and remove the corresponding `_rowModels`
    entries (you don''t need `paginatedRowModel` if pagination is server-side). State for the server-managed slices is best
    owned EITHER via external TanStack Store atoms (passed via `options.atoms`) OR via classic `state` + `on*Change` controlled
    state â€” both work. With Query, the atom pattern lets you key your query on the atom and let the table write directly to
    it without `on*Change` plumbing.'
  requires:
  - state-management
  - pagination
  - filtering
  - sorting
  sources:
  - TanStack/table:examples/react/basic-external-atoms/
