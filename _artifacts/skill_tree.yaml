    Pacer is the v9 replacement for the hand-rolled `DebouncedInput` component that appears in every v8 filtering example
    â€” the new pattern keeps the input shape but replaces `setTimeout` plumbing with `useDebouncedCallback`.'
  requires:
  - filtering
  - column-layout
  sources:
  - TanStack/table:examples/react/with-tanstack-form/
