    />` once at the app root, and call `useTanStackTableDevtools(table, name?)` immediately after each `useTable`. Devtools
    shows registered tables (with a selector if multiple are named), live state, options, rows, columns, and features. By
    default devtools are dev-mode only â€” the framework adapter ships no-op exports when `process.env.NODE_ENV !== 'development'`.
