- name: Production Readiness
  slug: production-readiness
  type: lifecycle
  domain: lifecycle
  path: packages/react-table/skills/react/production-readiness/SKILL.md
  package: packages/react-table
  description: 'Ship-ready optimizations for v9: tree-shake the bundle by registering ONLY the `_features` you actually use;
    memoize `_features`, `data`, and `columns` for stable identity; replace `(state) => state` with narrow selectors or per-slice
    `useSelector(table.atoms.<slice>)` subscriptions; and push state-driven re-renders down the tree with `<table.Subscribe>`
    (or the standalone `<Subscribe>` import) so the expensive table body doesn''t re-render every time you toggle a sort indicator.
    Production builds of the table devtools are also a `/production` import flip â€” see `compose-with-tanstack-devtools`.'
  requires:
  - setup
  - state-management
  - react/table-state
  sources:
  - TanStack/table:docs/guide/features.md
  - TanStack/table:docs/framework/react/guide/table-state.md
