- name: Column Layout Features
  slug: column-layout
  type: core
  domain: ui-state-features
  path: packages/table-core/skills/column-layout/SKILL.md
  package: packages/table-core
  description: 'The five UI-state-only column features that shape how columns render: visibility (show/hide), ordering (manual
    sequence), pinning (left/right regions), sizing (px widths with min/max), and resizing (drag handle that commits to columnSizing).
    All are opt-in via `tableFeatures({ ... })`, share the consumer''s state-management story (`initialState` vs hoisted `state`
    + `on*Change`), and combine through a fixed reorder pipeline: Column Pinning -> Manual Column Ordering -> Grouping. None
    of these features require a row model â€” they only affect layout.'
  requires:
  - state-management
  subsystems:
  - visibility
  - ordering
  - pinning
  - sizing
  - resizing
  sources:
  - TanStack/table:docs/guide/column-visibility.md
  - TanStack/table:docs/guide/column-ordering.md
  - TanStack/table:docs/guide/column-pinning.md
  - TanStack/table:docs/guide/column-sizing.md
  - TanStack/table:docs/guide/column-resizing.md
  - TanStack/table:examples/react/column-resizing-performant/
- name: Row Pinning
  slug: row-pinning
  type: core
  domain: ui-state-features
  path: packages/table-core/skills/row-pinning/SKILL.md
  package: packages/table-core
  description: 'Pin specific rows to a top region or bottom region that stays visible across pagination and filtering. State
    shape is `{ top: string[]; bottom: string[] }` keyed by `row.id`. Simpler pipeline than column pinning â€” only one reorder
    step happens after row pinning (sorting) and pinned rows are sorted within their region.'
  requires:
  - state-management
  sources:
  - TanStack/table:docs/guide/row-pinning.md
  - TanStack/table:examples/react/row-pinning/
- name: Row Selection
  slug: row-selection
  type: core
  domain: ui-state-features
  path: packages/table-core/skills/row-selection/SKILL.md
  package: packages/table-core
  description: 'Track which rows are selected via `rowSelection: Record<rowId, boolean | undefined>` and derive selected-row
    models scoped to the current data (`getSelectedRowModel`), to filtered data (`getFilteredSelectedRowModel`), or to grouped
    data (`getGroupedSelectedRowModel`). Supports single-select via `enableMultiRowSelection: false`, conditional row-by-row
    enabling via predicates, and parent->child propagation via `enableSubRowSelection`. The row id used in the selection map
    defaults to `row.index` â€” supplying a stable `getRowId` is essentially mandatory for any real-world use.'
  requires:
  - state-management
  - column-definitions
  sources:
  - TanStack/table:docs/guide/row-selection.md
  - TanStack/table:examples/react/row-selection/
  - TanStack/table:examples/angular/row-selection-signal/
