    / `manualSorting` / `manualFiltering` so the table doesn''t re-process server-processed rows, and pass `rowCount` so `getPageCount()`
    works without all rows in memory. The cleanest wiring uses an external pagination atom + `options.atoms.pagination` so
    table writes auto-trigger Query refetches â€” no `onPaginationChange` handler required. Examples for React, Vue, Solid,
    Svelte, and Preact all live in `examples/<framework>/with-tanstack-query`. Angular uses `rxResource` instead of Query
    in `examples/angular/remote-data`.'
