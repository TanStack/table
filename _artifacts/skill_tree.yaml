- name: Compose With Tanstack Pacer
  slug: compose-with-tanstack-pacer
  type: composition
  domain: composition
  path: packages/react-table/skills/react/compose-with-tanstack-pacer/SKILL.md
  package: packages/react-table
  description: 'Use `@tanstack/<fw>-pacer` to debounce/throttle the high-frequency writes that drive an interactive table:
    column filter inputs and column resize state. Pattern: import `useDebouncedCallback` from `@tanstack/react-pacer/debouncer`,
    wrap your `onChange` writer in it, and keep local state for the input value so typing feels instant. For column resizing,
    the equivalent is throttling `onColumnResizingChange` so a drag doesn''t push 60 state updates a second through the store.
    Pacer is the v9 replacement for the hand-rolled `DebouncedInput` component that appears in every v8 filtering example
    â€” the new pattern keeps the input shape but replaces `setTimeout` plumbing with `useDebouncedCallback`.'
  requires:
  - filtering
  - column-layout
  sources:
  - TanStack/table:examples/react/with-tanstack-form/
