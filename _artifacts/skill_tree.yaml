- name: Compose With Tanstack Virtual
  slug: compose-with-tanstack-virtual
  type: composition
  domain: composition
  path: packages/react-table/skills/react/compose-with-tanstack-virtual/SKILL.md
  package: packages/react-table
  description: 'TanStack Table does NOT include virtualization â€” pair with TanStack Virtual (`@tanstack/<fw>-virtual`). The
    standard pattern: get the row array from `table.getRowModel().rows`, feed `rows.length` to `useVirtualizer({ count, estimateSize,
    getScrollElement, ... })`, iterate `rowVirtualizer.getVirtualItems()` instead of `rows.map`, absolute-position each row
    with `transform: translateY(virtualRow.start)px`, and render the `<tbody>` as a CSS grid with a fixed total height. The
    virtualizer MUST live in the lowest possible component so it doesn''t re-run when unrelated state changes. Column virtualization
    uses the same shape but with `horizontal: true` and padding-left/padding-right placeholder `<th>`/`<td>` cells. Infinite
    scroll combines this with `useInfiniteQuery` + a `fetchMoreOnBottomReached` callback. The experimental examples (`virtualized-rows-experimental`,
    `virtualized-columns-experimental`) show next-gen patterns using `rowVirtualizer.measureElement` + manual style application
    for max perf.'
  requires:
  - react/table-state
  - row-expanding
  sources:
  - TanStack/table:docs/guide/virtualization.md
  - TanStack/table:examples/react/virtualized-rows/
  - TanStack/table:examples/react/virtualized-columns/
  - TanStack/table:examples/react/virtualized-infinite-scrolling/
  - TanStack/table:examples/react/virtualized-rows-experimental/
