- name: Compose With Tanstack Query
  slug: compose-with-tanstack-query
  type: composition
  domain: composition
  path: packages/react-table/skills/react/compose-with-tanstack-query/SKILL.md
  package: packages/react-table
  description: 'Server-side / async data flow with TanStack Query. Key the query on the table state that drives the request
    (pagination + sort + filters), pass `placeholderData: keepPreviousData` to avoid a "0 rows flash" between pages, set `manualPagination`
    / `manualSorting` / `manualFiltering` so the table doesn''t re-process server-processed rows, and pass `rowCount` so `getPageCount()`
    works without all rows in memory. The cleanest wiring uses an external pagination atom + `options.atoms.pagination` so
    table writes auto-trigger Query refetches â€” no `onPaginationChange` handler required. Examples for React, Vue, Solid,
    Svelte, and Preact all live in `examples/<framework>/with-tanstack-query`. Angular uses `rxResource` instead of Query
    in `examples/angular/remote-data`.'
  requires:
  - react/client-to-server
  - pagination
  - state-management
  sources:
  - TanStack/table:examples/react/with-tanstack-query/src/main.tsx
  - TanStack/table:examples/react/with-tanstack-query/src/fetchData.ts
  - TanStack/table:examples/angular/remote-data/
