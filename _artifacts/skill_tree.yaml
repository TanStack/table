- name: Compose With Tanstack Store
  slug: compose-with-tanstack-store
  type: composition
  domain: composition
  path: packages/react-table/skills/react/compose-with-tanstack-store/SKILL.md
  package: packages/react-table
  description: v9 is built on TanStack Store. Each state slice (sorting, pagination, rowSelection, columnFilters, ...) is
    a separate atom. The table exposes three read surfaces â€” `table.atoms.<slice>` (per-slice readonly), `table.store` (flat
    readonly view), and `table.state` (selector output from `useTable`) â€” and two write paths â€” internal `table.baseAtoms.<slice>`
    OR YOUR `options.atoms[slice]` if you opt to own the slice. The `atoms` option lets a slice be shared across components,
    persisted, or wired to a non-table subscriber. Use `useCreateAtom` to create the atom in React; `useSelector` to read
    it in any component without going through the table; the table writes to your atom directly when you call `table.setSorting(...)`
    etc.
  requires:
  - state-management
  sources:
  - TanStack/table:docs/framework/react/guide/table-state.md
  - TanStack/table:examples/react/basic-external-atoms/
