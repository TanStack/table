- name: Compose With Tanstack Form
  slug: compose-with-tanstack-form
  type: composition
  domain: composition
  path: packages/react-table/skills/react/compose-with-tanstack-form/SKILL.md
  package: packages/react-table
  description: 'Editable cells with TanStack Form. The table is the layout primitive; the form owns the state. Use `createFormHook`
    to register reusable field components (`TextField`, `NumberField`, `SelectField`), then in each column''s `cell` renderer
    return `<form.AppField name={`data[${row.index}].field`}>{(field) => <field.TextField />}</form.AppField>`. Important
    typing gotcha: if your row type has a recursive `subRows`, `Omit<Row, ''subRows''>` to a flat shape before passing to
    the form â€” TanStack Form''s `DeepKeys` chases the recursion and hits TS2589 ("type instantiation is excessively deep").
    Subscribe to `form.state.values.data.length` (not the whole array) to trigger re-renders for row add/remove without infinite
    loops. Pair with TanStack Pacer for debounced filter inputs on the same screen.'
  requires:
  - row-selection
  - column-definitions
  sources:
  - TanStack/table:examples/react/with-tanstack-form/
