          point
        skills:
          - pagination
          - row-selection
          - client-to-server
      - mistake: autoResetPageIndex resets to initialState.pageIndex instead of 0
        mechanism: |
          `_autoResetPageIndex` calls `table.resetPageIndex()` without `true`, so when data
