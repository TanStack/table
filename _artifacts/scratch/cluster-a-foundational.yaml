# target package: @tanstack/table-core (with React adapter examples)
# scope: Cluster A — Foundational Core (4 skills)

skills:
  - name: 'Setup'
    slug: 'setup'
    domain: 'core-foundations'
    description: 'Install a table adapter and wire up a first working table with `_features`, `_rowModels`, columns, and data.'
    type: 'core'
    packages: ['@tanstack/table-core']
    covers:
      - 'tableFeatures'
      - '_features'
      - '_rowModels'
      - 'useTable'
      - 'constructTable'
      - '_createTable'
      - 'stockFeatures'
      - 'coreFeatures'
      - 'storeReactivityBindings'
      - 'FlexRender'
      - 'flexRender'
      - 'table.getHeaderGroups'
      - 'table.getRowModel'
    tasks:
      - 'Render a first read-only table from an array of objects'
      - 'Decide between an empty `tableFeatures({})` core-only setup vs `stockFeatures` (all features) vs hand-picked feature imports'
      - 'Wire up the matching adapter (`useTable` / `injectTable` / `createTable` / `constructTable`) and render markup with `<table.FlexRender />` or `flexRender`'
      - 'Use `@tanstack/table-core` + `storeReactivityBindings()` directly (vanilla JS) when no framework adapter exists'
    failure_modes:
      - mistake: 'Omits `_features` and `_rowModels`'
        mechanism: 'v9 requires `_features` (and an `_rowModels` map, even if empty) at the top of `useTable`/`constructTable` options. Without `_features`, TypeScript loses feature-state inference and runtime construction has no feature plugins to register.'
        wrong_pattern: |
          // v8-flavoured, breaks in v9
          const table = useTable({
            columns,
            data,
            getCoreRowModel: getCoreRowModel(), // v8 option name
          })
        correct_pattern: |
          // v9 minimal table
          const _features = tableFeatures({}) // empty = core features only
          const table = useTable({
            _features,
            _rowModels: {}, // core row model auto-included
            columns,
            data,
          })
        source: 'examples/react/basic-use-table/src/main.tsx:56-109; docs/guide/tables.md:33-47; docs/framework/react/guide/migrating.md:78-103'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'v9 alpha; affects every user upgrading from v8 — the hook is renamed (`useReactTable` → `useTable`) AND new required options were introduced'

      - mistake: 'Calls `tableFeatures({})` inside the component body'
        mechanism: "A fresh `_features` object on each render destroys the table's stable reference for feature registration, the same way unstable `columns`/`data` cause infinite re-renders. `_features` must be hoisted to module scope or memoized."
        wrong_pattern: |
          function MyTable() {
            // ❌ new object every render -> potential re-construct + state churn
            const _features = tableFeatures({ rowSortingFeature })
            const table = useTable({ _features, _rowModels: {}, columns, data })
          }
        correct_pattern: |
          // ✅ module-scoped, stable reference
          const _features = tableFeatures({ rowSortingFeature })

          function MyTable() {
            const table = useTable({ _features, _rowModels: {}, columns, data })
          }
        source: 'docs/guide/data.md:184-244; examples/react/basic-use-table/src/main.tsx:56 (defined outside component)'
        priority: 'HIGH'
        status: 'active'
        version_context: 'v9 alpha; new in v9 because v8 had no `_features` option'
        skills: ['state-management']

      - mistake: 'Reaches for `stockFeatures` by default'
        mechanism: "Reaching for `stockFeatures` re-introduces v8 bundle size (~15–20kb), silently negating v9's opt-in tree-shaking. The v9 default is hand-picked features; `stockFeatures` exists only as a v8 escape hatch."
        wrong_pattern: |
          // ❌ ships every feature, even unused ones
          import { useTable, stockFeatures } from '@tanstack/react-table'
          const table = useTable({
            _features: stockFeatures,
            _rowModels: {},
            columns,
            data,
          })
        correct_pattern: |
          // ✅ only the features you use
          import {
            tableFeatures,
            useTable,
            rowSortingFeature,
            rowPaginationFeature,
          } from '@tanstack/react-table'

          const _features = tableFeatures({
            rowSortingFeature,
            rowPaginationFeature,
          })
        source: 'docs/framework/react/guide/migrating.md:9-12,136-147; packages/table-core/src/features/stockFeatures.ts:38-53'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'v9 alpha; `stockFeatures` is documented but discouraged for new code'

      - mistake: 'Adds a row model without registering its feature'
        mechanism: 'Row model factories like `createSortedRowModel` only run if the matching feature (e.g. `rowSortingFeature`) is also registered in `_features`. TypeScript flags this when state slices/APIs are accessed, but runtime silently degrades — `table.atoms.sorting` is undefined and sort handlers do nothing.'
        wrong_pattern: |
          // ❌ rowSortingFeature missing from _features — sortedRowModel orphaned
          const _features = tableFeatures({ rowPaginationFeature })
          const table = useTable({
            _features,
            _rowModels: {
              sortedRowModel: createSortedRowModel(sortFns), // no-op
              paginatedRowModel: createPaginatedRowModel(),
            },
            columns,
            data,
          })
        correct_pattern: |
          // ✅ feature + row model registered together
          const _features = tableFeatures({
            rowSortingFeature,
            rowPaginationFeature,
          })
          const table = useTable({
            _features,
            _rowModels: {
              sortedRowModel: createSortedRowModel(sortFns),
              paginatedRowModel: createPaginatedRowModel(),
            },
            columns,
            data,
          })
        source: 'docs/guide/row-models.md:46-78; examples/react/basic-external-atoms/src/main.tsx:27-30,81-92'
        priority: 'HIGH'
        status: 'active'
        version_context: 'v9 alpha; new failure surface since v8 had no _features/feature-row-model pairing'

  - name: 'Column Definitions'
    slug: 'column-definitions'
    domain: 'core-foundations'
    description: 'Define columns with `createColumnHelper<typeof _features, TData>()` to extract data and render headers/cells/footers.'
    type: 'core'
    packages: ['@tanstack/table-core']
    covers:
      - 'createColumnHelper'
      - 'columnHelper.accessor'
      - 'columnHelper.display'
      - 'columnHelper.group'
      - 'columnHelper.columns'
      - 'ColumnDef'
      - 'AccessorKeyColumnDef'
      - 'AccessorFnColumnDef'
      - 'DisplayColumnDef'
      - 'GroupColumnDef'
      - 'accessorKey'
      - 'accessorFn'
      - 'header'
      - 'cell'
      - 'footer'
      - 'aggregatedCell'
      - 'id'
      - 'getRowId'
      - 'DeepKeys'
      - 'flexRender'
    tasks:
      - 'Create a typed `columnHelper` and define accessor/display/group columns with strong inference'
      - 'Pick between `accessorKey: "name.first"` (deep key with dots) and `accessorFn: row => row.name.first` for nested / computed values'
      - 'Use `getRowId` to derive stable row identifiers from data (instead of array index) so selection/expansion survive data updates'
      - 'Render headers/cells/footers with `<table.FlexRender />` (or `flexRender`) so string / JSX / function forms all work'
    failure_modes:
      - mistake: 'Passes only TData to `createColumnHelper`'
        mechanism: 'v9 changed the generic order: `createColumnHelper<TFeatures, TData>`. v8 code passed only `<TData>`, which now binds `TData` into the `TFeatures` slot and breaks every column type. The compiler error is noisy and not obvious.'
        wrong_pattern: |
          // ❌ v8 signature — TData ends up in the TFeatures slot
          const columnHelper = createColumnHelper<Person>()
        correct_pattern: |
          // ✅ v9 — TFeatures first, TData second; use typeof _features
          const _features = tableFeatures({ rowSortingFeature })
          const columnHelper = createColumnHelper<typeof _features, Person>()
        source: 'packages/table-core/src/helpers/columnHelper.ts:99-103; docs/framework/react/guide/migrating.md:484-499; examples/react/basic-external-atoms/src/main.tsx:32'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'v9 alpha; breaking change vs v8 generic signature'

      - mistake: 'Accessor function returns an object/array'
        mechanism: 'The accessed value is what the table uses for sorting, filtering, faceting, and grouping. Returning a non-primitive value means the built-in sort/filter/aggregation functions silently misbehave or throw — only `displayCell` ever sees the value formatted. A primitive `string`/`number`/`Date` is expected unless you supply a matching `sortFn`/`filterFn`/`aggregationFn`.'
        wrong_pattern: |
          // ❌ returns an object — built-in alphanumeric/text sort and includesString filter break
          columnHelper.accessor((row) => row.name, {
            id: 'name',
            cell: (info) => `${info.getValue().first} ${info.getValue().last}`,
          })
        correct_pattern: |
          // ✅ accessor returns a primitive; cell can still format it
          columnHelper.accessor((row) => `${row.name.first} ${row.name.last}`, {
            id: 'fullName',
            cell: (info) => info.getValue(),
          })
        source: 'docs/guide/column-defs.md:231; examples/react/basic-subscribe/src/main.tsx:103-108'
        priority: 'HIGH'
        status: 'active'
        version_context: 'always present'
        skills: ['customizing-feature-behavior']

      - mistake: 'Omits `id` on an accessorFn column'
        mechanism: 'When a column uses `accessorFn` (not `accessorKey`), there is nothing to derive an id from. The constructor throws "coreColumnsFeature require an id when using an accessorFn" in development. The same applies to non-string `header` values — without `id` or a string header, construction fails.'
        wrong_pattern: |
          // ❌ accessorFn + JSX header => no id can be derived
          columnHelper.accessor((row) => row.lastName, {
            header: () => <span>Last Name</span>,
            cell: (info) => info.getValue(),
          })
        correct_pattern: |
          // ✅ explicit id whenever you use accessorFn
          columnHelper.accessor((row) => row.lastName, {
            id: 'lastName',
            header: () => <span>Last Name</span>,
            cell: (info) => info.getValue(),
          })
        source: 'packages/table-core/src/core/columns/constructColumn.ts:91-100; examples/react/basic-use-table/src/main.tsx:65-70; docs/guide/column-defs.md:233-243'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'always present (same rule as v8)'

      - mistake: 'Defines `columns` inside the component without `useMemo`'
        mechanism: 'TanStack Table compares `columns` and `data` by reference. Re-creating either array on each render triggers internal recomputation that, in React, causes an infinite loop (state change -> render -> new `columns` -> state change). This is the #1 FAQ.'
        wrong_pattern: |
          function MyTable() {
            // ❌ new array reference every render -> infinite render loop
            const columns = [
              columnHelper.accessor('firstName', { header: 'First' }),
              columnHelper.accessor('lastName', { header: 'Last' }),
            ]
            const table = useTable({ _features, _rowModels: {}, columns, data })
          }
        correct_pattern: |
          // ✅ memoized columns or module-scoped via columnHelper.columns([...])
          function MyTable() {
            const columns = React.useMemo(
              () =>
                columnHelper.columns([
                  columnHelper.accessor('firstName', { header: 'First' }),
                  columnHelper.accessor('lastName', { header: 'Last' }),
                ]),
              [],
            )
            const table = useTable({ _features, _rowModels: {}, columns, data })
          }
        source: 'docs/faq.md:5-128; examples/react/basic-subscribe/src/main.tsx:51-127'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'always present; #1 reason for infinite re-renders'
        skills: ['setup', 'state-management']

      - mistake: 'Uses array index `row.id` and updates data'
        mechanism: "By default, `row.id` is the row's index in `data`. When `data` is reordered, filtered, or items are removed, row-keyed state (selection, expansion, pinning) attaches to the wrong row. `getRowId` derives a stable id from the row's own data."
        wrong_pattern: |
          // ❌ no getRowId -> rowSelection survives data updates but maps to wrong rows
          const table = useTable({
            _features,
            _rowModels: {},
            columns,
            data,
            enableRowSelection: true,
          })
        correct_pattern: |
          // ✅ stable id from the row's own identifier
          const table = useTable({
            _features,
            _rowModels: {},
            columns,
            data,
            getRowId: (row) => row.id,
            enableRowSelection: true,
          })
        source: 'docs/guide/rows.md:48-59; examples/react/basic-subscribe/src/main.tsx:148; packages/table-core/src/core/rows/coreRowsFeature.utils.ts:215-228'
        priority: 'HIGH'
        status: 'active'
        version_context: 'always present'

  - name: 'State Management'
    slug: 'state-management'
    domain: 'core-foundations'
    description: 'Coordinate table state slices (sorting, pagination, filters, selection, etc.) across `initialState`, `state`+`on*Change`, and external `atoms`, with awareness of v9 atom precedence.'
    type: 'core'
    packages: ['@tanstack/table-core']
    covers:
      - 'baseAtoms'
      - 'atoms'
      - 'store'
      - 'state'
      - 'initialState'
      - 'on[State]Change'
      - 'setOptions'
      - 'reset'
      - 'resetSorting'
      - 'resetPagination'
      - 'resetColumnFilters'
      - 'resetGlobalFilter'
      - 'resetRowSelection'
      - 'manualFiltering'
      - 'manualSorting'
      - 'manualPagination'
      - 'manualExpanding'
      - 'manualGrouping'
      - 'autoResetPageIndex'
      - 'autoResetAll'
      - 'TableState'
      - 'SortingState'
      - 'PaginationState'
      - 'RowSelectionState'
      - 'ColumnFiltersState'
      - 'GroupingState'
      - 'storeReactivityBindings'
      - 'createAtom'
      - 'useCreateAtom'
      - 'useSelector'
      - 'Subscribe'
      - 'table.Subscribe'
      - 'useTable selector (second argument)'
    tasks:
      - 'Decide which state ownership pattern fits — internal (default) vs `state`+`on*Change` (v8 controlled) vs external `atoms` (v9 preferred) vs `initialState` (starting value only)'
      - 'Promote a slice to external state when the app needs to share it with a server query, persistence, or another component'
      - 'Toggle a feature to a "manual" server-side mode (`manualSorting`, `manualFiltering`, `manualPagination`) — sort/filter/paginate happen server-side and the table just renders the page'
      - 'Reset state with feature reset APIs (`resetSorting()`, `resetPagination(true)`) and understand why `table.reset()` is unsafe when slices are externally owned'
    failure_modes:
      - mistake: 'Passes both `state.pagination` and `atoms.pagination`'
        mechanism: 'When both are supplied for the same slice, the external atom wins silently. `state.pagination` is then dead config — UI values written to React state never reach the table, leading to "I called setPagination but nothing updated" bugs.'
        wrong_pattern: |
          // ❌ both ownership paths for the same slice
          const paginationAtom = useCreateAtom<PaginationState>({ pageIndex: 0, pageSize: 10 })
          const [pagination, setPagination] = React.useState(...)

          const table = useTable({
            _features, _rowModels: {...}, columns, data,
            state: { pagination },       // ignored
            onPaginationChange: setPagination,
            atoms: { pagination: paginationAtom }, // wins
          })
        correct_pattern: |
          // ✅ pick one ownership path per slice — here, external atoms
          const paginationAtom = useCreateAtom<PaginationState>({ pageIndex: 0, pageSize: 10 })

          const table = useTable({
            _features, _rowModels: {...}, columns, data,
            atoms: { pagination: paginationAtom },
            // no state.pagination, no onPaginationChange needed
          })
        source: 'docs/framework/react/guide/table-state.md:315-316; docs/framework/react/guide/migrating.md:465-481; packages/table-core/src/core/table/constructTable.ts:93-103 (atom precedence)'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'v9 alpha; new ownership-conflict surface introduced by the `atoms` option'

      - mistake: 'Uses external `state` without the matching `on*Change` callback'
        mechanism: 'External `state.sorting` syncs into the table''s base atom, but without `onSortingChange` the table has no way to update React state — every sort toggle appears to do nothing. v9 silently keeps reading from `state` so the UI looks "stuck".'
        wrong_pattern: |
          // ❌ state without callback — sort toggles never reach setSorting
          const [sorting, setSorting] = React.useState<SortingState>([])
          const table = useTable({
            _features, _rowModels: { sortedRowModel: createSortedRowModel(sortFns) },
            columns, data,
            state: { sorting }, // no onSortingChange
          })
        correct_pattern: |
          // ✅ state + on*Change must be paired
          const [sorting, setSorting] = React.useState<SortingState>([])
          const table = useTable({
            _features, _rowModels: { sortedRowModel: createSortedRowModel(sortFns) },
            columns, data,
            state: { sorting },
            onSortingChange: setSorting,
          })
        source: 'docs/framework/react/guide/table-state.md:415-435; examples/react/basic-external-state/src/main.tsx:64-94'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'always present (same v8 rule)'

      - mistake: 'Uses `initialState` to control or update state'
        mechanism: '`initialState` is only read once at construction time to build base atoms; mutating it later does NOT update table state. Developers expect a React-state-like contract and watch state freeze in place.'
        wrong_pattern: |
          // ❌ updates to initialState are ignored after first render
          function MyTable({ defaultSort }: { defaultSort: SortingState }) {
            const table = useTable({
              _features, _rowModels: { sortedRowModel: createSortedRowModel(sortFns) },
              columns, data,
              initialState: { sorting: defaultSort }, // ❌ later changes to defaultSort never sync
            })
          }
        correct_pattern: |
          // ✅ control with state + on*Change (or an external atom)
          function MyTable({ defaultSort }: { defaultSort: SortingState }) {
            const [sorting, setSorting] = React.useState(defaultSort)
            const table = useTable({
              _features, _rowModels: { sortedRowModel: createSortedRowModel(sortFns) },
              columns, data,
              state: { sorting },
              onSortingChange: setSorting,
            })
          }
        source: 'docs/framework/vanilla/guide/table-state.md:142-175; docs/framework/react/guide/table-state.md:285-315'
        priority: 'HIGH'
        status: 'active'
        version_context: 'always present (same v8 rule)'

      - mistake: 'Writes to `table.baseAtoms.x.set(...)` while `atoms.x` owns the slice'
        mechanism: "When an external atom is supplied for a slice, `table.atoms.x` derives from it, not from `baseAtoms.x`. Writes to the base atom silently no-op for reads; the UI shows the external atom's value, the base atom drifts, and reset behavior gets weird."
        wrong_pattern: |
          // ❌ direct baseAtoms write while external atom owns the slice
          const paginationAtom = useCreateAtom<PaginationState>({ pageIndex: 0, pageSize: 10 })
          const table = useTable({ _features, _rowModels: {...}, columns, data, atoms: { pagination: paginationAtom } })

          // later, somewhere
          table.baseAtoms.pagination.set((old) => ({ ...old, pageIndex: 0 }))
          // ❌ baseAtom updated, but table.atoms.pagination still reads from paginationAtom
        correct_pattern: |
          // ✅ write to the external atom (or use the feature's setter API)
          paginationAtom.set((old) => ({ ...old, pageIndex: 0 }))
          // or
          table.setPageIndex(0)
        source: 'docs/framework/vanilla/guide/table-state.md:138-141; docs/framework/react/guide/table-state.md:280-283; packages/table-core/src/core/table/constructTable.ts:93-103'
        priority: 'HIGH'
        status: 'active'
        version_context: 'v9 alpha; new pitfall introduced by atom architecture'

      - mistake: 'Forgets `manualSorting`/`manualFiltering`/`manualPagination` when serving server-side data'
        mechanism: 'Without the `manual*` flag, the table re-applies its client-side row models on top of already-sorted/filtered/paginated server data — rows get re-sorted, re-filtered, or sliced into another page. Symptoms: wrong rows shown, broken page math, blank pages.'
        wrong_pattern: |
          // ❌ data is already paginated server-side, but table still slices it
          const dataQuery = useQuery({ queryKey: ['data', pagination], queryFn: fetchPage })
          const table = useTable({
            _features, _rowModels: { paginatedRowModel: createPaginatedRowModel() },
            columns,
            data: dataQuery.data?.rows ?? [],
            rowCount: dataQuery.data?.rowCount,
            atoms: { pagination: paginationAtom },
            // ❌ missing manualPagination: true
          })
        correct_pattern: |
          // ✅ tell the table the server handles pagination
          const table = useTable({
            _features, _rowModels: {}, // can drop paginatedRowModel if fully server-side
            columns,
            data: dataQuery.data?.rows ?? [],
            rowCount: dataQuery.data?.rowCount,
            atoms: { pagination: paginationAtom },
            manualPagination: true,
          })
        source: 'docs/framework/vanilla/guide/table-state.md:197-228; docs/framework/react/guide/table-state.md:336-378; packages/table-core/src/features/row-pagination/rowPaginationFeature.types.ts:20-23'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'always present (same v8 rule)'

      - mistake: 'Uses `table.reset()` to clear externally owned state'
        mechanism: '`table.reset()` only resets the internal `baseAtoms` to `initialState`; slices owned by external atoms or external `state` are untouched. Developers expect "reset everything" and end up with half-reset state (visible state from external atom, hidden state in baseAtom drifts).'
        wrong_pattern: |
          // ❌ external atom keeps its current value; only baseAtoms reset
          const sortingAtom = useCreateAtom<SortingState>([])
          const table = useTable({
            _features, _rowModels: {...}, columns, data,
            atoms: { sorting: sortingAtom },
          })
          // ...
          table.reset() // sortingAtom is NOT cleared
        correct_pattern: |
          // ✅ feature-specific reset writes through the slice's updater (atom-aware)
          table.resetSorting() // works whether sorting is internal or external
          // or, if you specifically want to clear the external atom:
          sortingAtom.set([])
        source: 'docs/framework/vanilla/guide/table-state.md:177-188; docs/framework/react/guide/table-state.md:317-328; packages/table-core/src/core/table/coreTablesFeature.utils.ts:42-65'
        priority: 'HIGH'
        status: 'active'
        version_context: 'v9 alpha; the atom split makes `reset()` less safe than v8'

  - name: 'Customizing Feature Behavior'
    slug: 'customizing-feature-behavior'
    domain: 'core-foundations'
    description: 'Override per-column `sortFn`, `filterFn`, `aggregationFn`, and table-level `globalFilterFn` — and chain filter→sort metadata via `addMeta`.'
    type: 'core'
    packages: ['@tanstack/table-core']
    covers:
      - 'filterFn'
      - 'sortFn'
      - 'aggregationFn'
      - 'globalFilterFn'
      - 'FilterFn'
      - 'SortFn'
      - 'AggregationFn'
      - 'addMeta'
      - 'autoRemove'
      - 'resolveFilterValue'
      - 'columnFiltersMeta'
      - 'filterFns'
      - 'sortFns'
      - 'aggregationFns'
      - 'FilterFnOption'
      - 'SortFnOption'
      - 'AggregationFnOption'
      - 'BuiltInFilterFn'
      - 'BuiltInSortFn'
      - 'BuiltInAggregationFn'
      - 'invertSorting'
      - 'sortUndefined'
      - 'sortDescFirst'
    tasks:
      - "Author a custom `filterFn` (e.g. fuzzy filter) and reference it by name from a column's `filterFn` option after registering it via `createFilteredRowModel({ ...filterFns, custom })`"
      - 'Use the `addMeta` argument inside a `filterFn` to stash ranking info on the row, then read it from a custom `sortFn` via `row.columnFiltersMeta[columnId]` for filter→sort handoff (canonical: match-sorter-utils fuzzy)'
      - 'Pick a built-in `sortFn` by string name (`alphanumeric`, `text`, `datetime`, `basic`) for a column, then layer `invertSorting`/`sortDescFirst`/`sortUndefined` for direction control'
      - 'Register a custom `aggregationFn` for a grouped column (e.g. weighted average) by passing it through `createGroupedRowModel({ ...aggregationFns, custom })`'
    failure_modes:
      - mistake: 'References a custom filterFn by string without registering it'
        mechanism: "String values for `filterFn` are looked up in `table._rowModelFns.filterFns`. If the custom fn is not passed to `createFilteredRowModel({ ...filterFns, custom: myFn })`, the lookup misses and `column_getFilterFn` logs `Could not find a valid 'column.filterFn' for column with the ID: X`. The column then falls back to a no-op and the filter silently fails."
        wrong_pattern: |
          // ❌ "fuzzy" string never registered
          const table = useTable({
            _features, columns: [
              columnHelper.accessor('fullName', { filterFn: 'fuzzy' }),
            ],
            _rowModels: {
              filteredRowModel: createFilteredRowModel(filterFns), // ❌ no fuzzy in here
            },
            data,
          })
        correct_pattern: |
          // ✅ register the custom fn AND module-augment for type safety
          declare module '@tanstack/react-table' {
            interface FilterFns {
              fuzzy: FilterFn<typeof _features, Person>
            }
          }

          const fuzzyFilter: FilterFn<typeof _features, Person> = (row, columnId, value, addMeta) => {
            const itemRank = rankItem(row.getValue(columnId), value)
            addMeta?.({ itemRank })
            return itemRank.passed
          }

          const table = useTable({
            _features,
