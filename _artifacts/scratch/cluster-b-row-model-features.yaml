  - issue: 'v9 createColumnHelper signature change'
    detail: 'v9 requires `createColumnHelper<typeof _features, TData>()` — TFeatures FIRST. v8 was `createColumnHelper<TData>()`. Every cluster-B example confirms this pattern (filters, filters-faceted, filters-fuzzy, sorting, pagination, grouping, expanding, sub-components all use `<typeof _features, Person>`).'

  - issue: 'Framework variation: Vue/Svelte/Solid/Angular use signal/reactive data getter'
    detail: |
      React: `useTable({ data, columns, ... })` — data is a value.
      Vue: `useTable({ get columns() { return columns.value }, data, ... })` — getter for reactivity.
      Solid: `createTable({ get data() { return data() }, columns, ... })` — getter against signal.
      Svelte: `createTable({ get data() { return data }, ... })` — getter against $state rune.
      Angular: `injectTable(() => ({ data: this.data(), columns, ... }))` — whole config is a factory.
      All use the same `tableFeatures({ ... })` and `_rowModels` shapes. The reactive plumbing differs.

  - issue: 'Faceting requires THREE row models in lockstep'
    detail: "createFacetedRowModel() is the base; createFacetedUniqueValues() and createFacetedMinMaxValues() both depend on it (column_getFacetedUniqueValues / column_getFacetedMinMaxValues both call column_getFacetedRowModel internally for the memoDep). Phase 1+2 note flagged this as 'agents commonly forget the base faceted row model'. Confirmed by reading source."

  - issue: 'fuzzy filter and addMeta parameter is optional'
    detail: "FilterFn signature: `(row, columnId, filterValue, addMeta?: (meta: FilterMeta) => void) => boolean`. The 4th arg is OPTIONAL (`addMeta?:`). The fuzzy filter example uses `addMeta?.({ itemRank })` with optional chaining. But createFilteredRowModel ALWAYS passes a real addMeta function (createFilteredRowModel.ts:131-135 and 150-154). So in practice the `?.` is unnecessary defensiveness — but it's idiomatic in examples."

  - issue: 'manual* flags are mutually independent — agents try to combine them'
    detail: "manualFiltering, manualSorting, manualGrouping, manualExpanding, manualPagination can each be set independently. They each cause the corresponding row model to be SKIPPED (the pre-* model is returned instead). Order still applies: manualFiltering doesn't skip grouping. Agents sometimes think 'manual everything' means 'use raw data as-is' — but if you set manualFiltering + manualSorting but NOT manualPagination, the table still paginates the raw data."
